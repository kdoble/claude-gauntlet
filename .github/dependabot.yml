version: 2
updates:
  # The only moving dependency is the GitHub Actions in .github/workflows. Dependabot opens a
  # PR when a pinned action has a newer reviewed release, so the SHA pins stay current on purpose
  # instead of rotting. There are no Python runtime dependencies to track.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
